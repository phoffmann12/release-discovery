# Portainer stack file. Deploy via: Stacks -> Add stack -> Repository
#   Repository URL:  https://github.com/phoffmann12/release-discovery
#   Compose path:    portainer-stack.yml
# Add SPOTIFY_CLIENT_ID / SPOTIFY_CLIENT_SECRET / LASTFM_API_KEY / NTFY_TOPIC
# under the stack's "Environment variables" section.
# One-time Spotify login: run `python main.py auth` from the container console
# (see README -> "Deploy on Portainer").
services:
  notifier:
    build: .
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      LASTFM_API_KEY: ${LASTFM_API_KEY}
      NTFY_TOPIC: ${NTFY_TOPIC}
      # Loopback IP, not 'localhost' — Spotify is deprecating localhost redirect URIs.
      # Must match the redirect URI registered in your Spotify app. Override in the
      # stack's env-var section if you registered a different one.
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:8888/callback}
      # NTFY_URL: http://ntfy:80        # only if you self-host ntfy in this stack
      # Concerts (ADR-0008, opt-in): set CONCERT_CITIES in the stack's env-var section
      # to a comma-separated list of cities to enable. Empty = feature off.
      CONCERT_CITIES: ${CONCERT_CITIES:-}
      CONCERT_LOOKAHEAD_DAYS: ${CONCERT_LOOKAHEAD_DAYS:-180}
    volumes:
      - metal-data:/data               # named volume — survives stack updates
    restart: unless-stopped

volumes:
  metal-data:
